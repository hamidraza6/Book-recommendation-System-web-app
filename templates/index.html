<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>50 Most Popular Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container">
      <div class="top-nav">
        <a href="#home">Home</a>
        <a href="/recommend">Recommender</a>
        <a href="/connect">Connect</a>
      </div>
      <div id="home">
        <h1>50 Most Popular Books</h1>
      </div>
      <div class="container mt-4">
      {% for _ in book_name[:50] %}
        <div class="book-item">
          <div class="row g-0 align-items-center">
            <div class="col-auto">
              <img src="{{ image[loop.index0] }}" alt="cover" style="width:64px;height:auto;" />
            </div>
            <div class="col">
              <div>
                <strong>{{ book_name[loop.index0] }}</strong>
              </div>
              <div class="text-muted">{{ author[loop.index0] }}</div>
              <div class="small">Ratings: {{ votes[loop.index0] }} | Avg: {{ rating[loop.index0] }}</div>
              <!-- popularity bar removed per request -->
            </div>
          </div>
        </div>
      {% endfor %}
      </div>
      <!-- <p class="mt-4"><a href="/recommend" class="btn btn-primary">Get recommendations</a></p> -->
    </div>
  </body>
</html>
